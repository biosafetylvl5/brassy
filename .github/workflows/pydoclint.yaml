name: PyDocLint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pydoclint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydoclint

      - name: Run PyDocLint
        run: |
          pydoclint $(git ls-files '*.py' | grep -v '^tests/') --style=numpy
